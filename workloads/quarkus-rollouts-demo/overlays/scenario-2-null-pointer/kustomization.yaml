apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: quarkus-demo

resources:
- ../../base

patches:
- path: rollout-patch.yaml
  target:
    kind: Rollout
    name: quarkus-demo

images:
- name: quay.io/kevindubois/argo-rollouts-quarkus-demo
  newName: ghcr.io/kdubois/argo-rollouts-quarkus-demo
  newTag: v2.nullpointer

commonLabels:
  scenario: null-pointer-bug